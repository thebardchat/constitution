<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080602"/>
      <stop offset="50%" stop-color="#100e06"/>
      <stop offset="100%" stop-color="#080602"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="goldVert" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2a1c04" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#080602" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="480" cy="210" rx="600" ry="400" fill="url(#glow)"/>

  <!-- Parchment texture lines -->
  <g opacity="0.03" stroke="#f59e0b" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
  </g>

  <!-- Left accent line - gold vertical -->
  <rect x="80" y="100" width="3" height="430" rx="1.5" fill="url(#goldVert)" opacity="0.7"/>

  <!-- Official seal circle decoration - right side -->
  <circle cx="980" cy="315" r="200" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.06"/>
  <circle cx="980" cy="315" r="160" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.08"/>
  <circle cx="980" cy="315" r="120" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.1"/>
  <!-- Scale of justice icon paths (simplified) -->
  <g transform="translate(980,315)" opacity="0.15" fill="none" stroke="#f59e0b" stroke-width="2">
    <line x1="0" y1="-80" x2="0" y2="80"/>
    <line x1="-70" y1="-50" x2="70" y2="-50"/>
    <circle cx="-70" cy="-30" r="25"/>
    <circle cx="70" cy="-30" r="25"/>
    <polygon points="0,-10 -20,20 20,20" fill="#f59e0b" opacity="0.3"/>
  </g>

  <!-- Document label -->
  <text x="100" y="118" font-family="'Courier New', monospace" font-size="12" fill="#a16207"
        font-weight="700" letter-spacing="4">OFFICIAL DOCUMENT  --  THECBARDCHAT ECOSYSTEM</text>
  <line x1="100" y1="126" x2="820" y2="126" stroke="#2a2008" stroke-width="1"/>

  <!-- Main title line 1 -->
  <text x="100" y="210" font-family="'Arial Black', Arial, sans-serif" font-size="74"
        font-weight="900" fill="url(#goldGrad)">ShaneTheBrain</text>
  <!-- Main title line 2 -->
  <text x="100" y="290" font-family="'Arial Black', Arial, sans-serif" font-size="74"
        font-weight="900" fill="#fef3c7">Constitution</text>

  <!-- Subtitle -->
  <text x="100" y="330" font-family="Arial, sans-serif" font-size="18" fill="#a09060">
    A personal covenant. 9 pillars. One source of truth.
  </text>

  <!-- Divider rule -->
  <line x1="100" y1="352" x2="750" y2="352" stroke="#2a2008" stroke-width="1"/>

  <!-- 9 pillars list - two columns -->
  <text x="100" y="378" font-family="Arial, sans-serif" font-size="14" fill="#a09060">01 Faith First</text>
  <text x="100" y="400" font-family="Arial, sans-serif" font-size="14" fill="#a09060">02 Family Stability</text>
  <text x="100" y="422" font-family="Arial, sans-serif" font-size="14" fill="#a09060">03 Sobriety Integrity</text>
  <text x="100" y="444" font-family="Arial, sans-serif" font-size="14" fill="#a09060">04 Local-First AI</text>
  <text x="100" y="466" font-family="Arial, sans-serif" font-size="14" fill="#a09060">05 80/20 Shipping</text>

  <text x="380" y="378" font-family="Arial, sans-serif" font-size="14" fill="#a09060">06 Serve the Left-Behind</text>
  <text x="380" y="400" font-family="Arial, sans-serif" font-size="14" fill="#a09060">07 Open by Default</text>
  <text x="380" y="422" font-family="Arial, sans-serif" font-size="14" fill="#a09060">08 ADHD-Aware Design</text>
  <text x="380" y="444" font-family="Arial, sans-serif" font-size="14" fill="#f59e0b" font-weight="700">09 Gratitude is Infrastructure</text>

  <!-- 9 pillars badge -->
  <rect x="100" y="490" width="130" height="34" rx="4" fill="#2a1c04" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="165" y="512" font-family="'Courier New', monospace" font-size="14" fill="#f59e0b"
        text-anchor="middle" font-weight="700" letter-spacing="2">9 PILLARS</text>

  <rect x="244" y="490" width="130" height="34" rx="4" fill="#2a1c04" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="309" y="512" font-family="'Courier New', monospace" font-size="14" fill="#d97706"
        text-anchor="middle" font-weight="700" letter-spacing="1">LOCAL-FIRST</text>

  <rect x="388" y="490" width="110" height="34" rx="4" fill="#2a1c04" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="443" y="512" font-family="'Courier New', monospace" font-size="14" fill="#d97706"
        text-anchor="middle" font-weight="700" letter-spacing="1">GPL v3</text>

  <!-- GitHub handle -->
  <text x="100" y="565" font-family="'Courier New', monospace" font-size="14" fill="#4a3820">
    github.com/thebardchat/constitution
  </text>

  <!-- Hazel Green AL attribution -->
  <text x="100" y="585" font-family="Arial, sans-serif" font-size="12" fill="#3a2c10">
    Written in Hazel Green, Alabama  ·  Christian Father  ·  Builder
  </text>

  <!-- Footer bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#050400" opacity="0.95"/>
  <text x="600" y="619" font-family="Arial, sans-serif" font-size="11" fill="#4a3820"
        text-anchor="middle" letter-spacing="1">
    Built by Shane Brazelton + Claude Anthropic  ·  GPL v3  ·  Hazel Green, AL
  </text>
</svg>
